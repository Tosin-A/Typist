name: Build Typist

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_path: dist/Typist.dmg
            artifact_name: Typist.dmg
          - os: windows-latest
            artifact_path: dist/Typist/Typist.exe
            artifact_name: Typist.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Inject version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python -c "
          import re
          f = 'app/version.py'
          v = '${VERSION}'
          content = open(f).read()
          content = re.sub(r'__version__ = \".*?\"', f'__version__ = \"{v}\"', content)
          open(f, 'w').write(content)
          "

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: bash build_macos.sh

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: build_windows.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Typist-${{ matrix.os }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: Typist-macos-latest
          path: release/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Typist-windows-latest
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Typist ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/Typist.dmg
            release/Typist.exe
